{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-header-row">
    <h3>Networks</h3>
    <div>
      <button id="network-create-btn" class="filter-btn">Create Network</button>
      <button id="refresh-btn" class="filter-btn">Refresh</button>
    </div>
  </div>

  <div class="filter-board">
    <div class="filter-group">
      <label>Lead</label>
      <select id="filter-lead">
        <option value="">All Leads</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Name</label>
      <input type="text" id="filter-name" placeholder="Search by name...">
    </div>
    <div class="filter-group">
      <label>Address</label>
      <input type="text" id="filter-address" placeholder="Search by address...">
    </div>
    <div class="filter-group">
      <label>Date From</label>
      <input type="date" id="filter-date-from">
    </div>
    <div class="filter-group">
      <label>Date To</label>
      <input type="date" id="filter-date-to">
    </div>
    <button id="apply-filters" class="filter-btn">Apply</button>
  </div>

  <div class="table-wrap">
    <table class="generic-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Lead</th>
          <th>Name</th>
          <th>Logo</th>
          <th>Color</th>
          <th>Address</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="networks-tbody">
        <tr><td colspan="8" class="loading">Loading companies...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loadLeads = () => {
        fetch('/api/leads').then(res => res.json()).then(data => {
            const sel = qs('filter-lead');
            if (data.leads) {
                data.leads.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l;
                    opt.textContent = l;
                    sel.appendChild(opt);
                });
            }
        });
    };

    const loadNetworksLocal = () => {
        const params = new URLSearchParams({
            lead: qs('filter-lead').value,
            name: qs('filter-name').value,
            address: qs('filter-address').value,
            date_from: qs('filter-date-from').value,
            date_to: qs('filter-date-to').value
        });
        
        fetch(`/api/workspaces?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('networks-tbody');
                if (data.ok && data.rows) {
                    tbody.innerHTML = data.rows.map(row => `
                        <tr>
                            <td>${row.id}</td>
                            <td>${escapeHtml(row.lead)}</td>
                            <td>${row.name}</td>
                            <td>${row.logo || ''}</td>
                            <td><span style="display:inline-block;width:20px;height:20px;background:${row.color};border-radius:4px;"></span> ${row.color || ''}</td>
                            <td>${row.address || ''}</td>
                            <td>${row.created_at}</td>
                            <td class="action-cell">
                                <button class="icon-btn edit" data-id="${row.id}" title="Edit">${iconPencilSvg()}</button>
                                <button class="icon-btn delete" data-id="${row.id}" title="Delete">${iconTrashSvg()}</button>
                            </td>
                        </tr>
                    `).join('') || '<tr><td colspan="8">No companies found</td></tr>';

                    tbody.querySelectorAll('.edit').forEach(btn => {
                        btn.onclick = () => {
                            const row = data.rows.find(x => x.id === btn.dataset.id);
                            handleUpsertWorkspace(row);
                        };
                    });
                    tbody.querySelectorAll('.delete').forEach(btn => {
                        btn.onclick = () => {
                            if (confirm('Delete this company?')) {
                                fetch(`/api/workspaces/${btn.dataset.id}`, { method: 'DELETE' })
                                    .then(res => res.json()).then(() => loadNetworksLocal());
                            }
                        };
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="7">No companies found</td></tr>';
                }
            });
    };

    loadLeads();
    loadNetworksLocal();
    qs('apply-filters').onclick = loadNetworksLocal;
    qs('refresh-btn').onclick = loadNetworksLocal;
    qs('network-create-btn').onclick = () => handleUpsertWorkspace();
});
</script>
{% endblock %}
