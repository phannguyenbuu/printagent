{% extends "base.html" %}
{% block content %}
<section class="panel timelapse-panel">
  <div class="filter-board infor-filter-board">
    <div class="filter-group">
      <label for="infor-filter-lead">Lead</label>
      <select id="infor-filter-lead">
        <option value="">loading leads...</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="infor-filter-id">ID</label>
      <input id="infor-filter-id" placeholder="id" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-printer-name">Tên máy</label>
      <input id="infor-filter-printer-name" placeholder="printer name" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-ip">IP</label>
      <input id="infor-filter-ip" placeholder="ip" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-mac-id">MAC ID</label>
      <input id="infor-filter-mac-id" placeholder="mac_id" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-lan-uid">LAN UID</label>
      <input id="infor-filter-lan-uid" placeholder="lan_uid" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-counter-min">Counter Min</label>
      <input id="infor-filter-counter-min" type="number" min="0" placeholder="min" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-counter-max">Counter Max</label>
      <input id="infor-filter-counter-max" type="number" min="0" placeholder="max" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-printed-min">PrinterPage Min</label>
      <input id="infor-filter-printed-min" type="number" min="0" placeholder="min" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-printed-max">PrinterPage Max</label>
      <input id="infor-filter-printed-max" type="number" min="0" placeholder="max" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-cartridge-status">Cartridge</label>
      <select id="infor-filter-cartridge-status">
        <option value="">all</option>
        <option value="ok">OK</option>
        <option value="empty">empty</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="infor-filter-updated-from">Updated From</label>
      <input id="infor-filter-updated-from" type="datetime-local" />
    </div>
    <div class="filter-group">
      <label for="infor-filter-updated-to">Updated To</label>
      <input id="infor-filter-updated-to" type="datetime-local" />
    </div>
    <div class="filter-group infor-filter-actions">
      <label>&nbsp;</label>
      <div>
        <button id="infor-filter-reset" class="filter-btn ghost" type="button">Reset</button>
        <button id="infor-filter-apply" class="filter-btn" type="button">Search</button>
      </div>
    </div>
  </div>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <div id="devices-meta" class="meta-line">DB: checking...</div>
    <button id="btn-export-all-csv" class="filter-btn" style="white-space: nowrap;">
      Export All CSV
    </button>
  </div>
  <div id="devices-grid" class="counter-grid">
    <div class="counter-card loading">Loading...</div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("btn-export-all-csv");
      if (!btn) return;
      btn.innerText = "Export All JSON";
      btn.addEventListener("click", async () => {
        try {
          btn.innerText = "Exporting...";
          btn.disabled = true;

          let lead = "";
          const leadSelect = document.getElementById("infor-filter-lead");
          if (leadSelect) lead = leadSelect.value;

          let url = "/api/infor/list?limit=0";
          if (typeof buildInforQueryParams === "function") {
            const params = buildInforQueryParams(0);
            url = `/api/infor/list?${params.toString()}`;
          } else if (lead) {
            url += "&lead=" + encodeURIComponent(lead);
          }

          const res = await fetch(url);
          const data = await res.json();

          if (!data.rows || data.rows.length === 0) {
            alert("No data found or API error.");
            return;
          }

          const jsonContent = JSON.stringify(data.rows, null, 2);
          const blob = new Blob([jsonContent], { type: "application/json;charset=utf-8;" });
          const link = document.createElement("a");
          const urlObj = URL.createObjectURL(blob);
          link.setAttribute("href", urlObj);
          link.setAttribute("download", `infor_data_export_${new Date().getTime()}.json`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(urlObj);

        } catch (e) {
          console.error(e);
          alert("Error exporting JSON: " + e.message);
        } finally {
          btn.innerText = "Export All JSON";
          btn.disabled = false;
        }
      });
    });
  </script>
  <div class="pager">
    <button id="devices-prev" aria-label="Previous page">
      <svg class="pager-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14.5 6.5 9 12l5.5 5.5"></path>
      </svg>
    </button>
    <div id="devices-page" class="pager-pages"></div>
    <button id="devices-next" aria-label="Next page">
      <svg class="pager-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9.5 6.5 15 12l-5.5 5.5"></path>
      </svg>
    </button>
    <div class="pager-limit">
      <select id="devices-limit" aria-label="Items per page">
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
        <option value="200">200 / page</option>
        <option value="0">All</option>
      </select>
    </div>
  </div>
</section>
{% endblock %}
