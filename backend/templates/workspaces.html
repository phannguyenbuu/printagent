{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-header-row">
    <h3>Workspaces</h3>
    <div>
      <button id="workspace-create-btn" class="filter-btn">Create Workspace</button>
      <button id="refresh-btn" class="filter-btn">Refresh</button>
    </div>
  </div>

  <div class="filter-board">
    <div class="filter-group">
      <label>Name</label>
      <input type="text" id="filter-name" placeholder="Search by name...">
    </div>
    <div class="filter-group">
      <label>Address</label>
      <input type="text" id="filter-address" placeholder="Search by address...">
    </div>
    <div class="filter-group">
      <label>Date From</label>
      <input type="date" id="filter-date-from">
    </div>
    <div class="filter-group">
      <label>Date To</label>
      <input type="date" id="filter-date-to">
    </div>
    <button id="apply-filters" class="filter-btn">Apply</button>
  </div>

  <div class="table-wrap">
    <table class="generic-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Logo</th>
          <th>Color</th>
          <th>Address</th>
          <th>User IDs</th>
          <th>Locations</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="workspaces-tbody">
        <tr><td colspan="9" class="loading">Loading workspaces...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loadWorkspaces = () => {
        const params = new URLSearchParams({
            name: qs('filter-name').value,
            address: qs('filter-address').value,
            date_from: qs('filter-date-from').value,
            date_to: qs('filter-date-to').value
        });
        fetch(`/api/workspaces?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('workspaces-tbody');
                if (data.ok && data.rows) {
                    tbody.innerHTML = data.rows.map(row => `
                        <tr>
                            <td>${row.id}</td>
                            <td>${escapeHtml(row.name || '')}</td>
                            <td>${escapeHtml(row.logo || '')}</td>
                            <td><span style="display:inline-block;width:20px;height:20px;background:${row.color || '#e5e7eb'};border-radius:4px;"></span> ${escapeHtml(row.color || '')}</td>
                            <td>${escapeHtml(row.address || '')}</td>
                            <td>${escapeHtml((row.userIds || []).join(', '))}</td>
                            <td>${row.locationCount || 0}</td>
                            <td>${row.created_at || ''}</td>
                            <td class="action-cell">
                                <button class="icon-btn edit" data-id="${row.id}" title="Edit">${iconPencilSvg()}</button>
                                <button class="icon-btn delete" data-id="${row.id}" title="Delete">${iconTrashSvg()}</button>
                            </td>
                        </tr>
                    `).join('') || '<tr><td colspan="9">No data found</td></tr>';

                    tbody.querySelectorAll('.edit').forEach(btn => {
                        btn.onclick = () => {
                            const row = data.rows.find(x => x.id === btn.dataset.id);
                            handleUpsertWorkspace(row);
                        };
                    });
                    tbody.querySelectorAll('.delete').forEach(btn => {
                        btn.onclick = () => {
                            if (confirm('Delete this workspace?')) {
                                fetch(`/api/workspaces/${btn.dataset.id}`, { method: 'DELETE' })
                                    .then(res => res.json()).then(() => loadWorkspaces());
                            }
                        };
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="9">No data found</td></tr>';
                }
            });
    };

    loadWorkspaces();
    document.getElementById('refresh-btn').onclick = loadWorkspaces;
    document.getElementById('apply-filters').onclick = loadWorkspaces;
    document.getElementById('workspace-create-btn').onclick = () => handleUpsertWorkspace();
});
</script>
{% endblock %}
