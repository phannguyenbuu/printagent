{% extends "base.html" %}

{% block content %}
<section class="card">
  <div class="card-header">
    <h2>Printer Drivers</h2>
    <p>Select a brand and model to find driver download links.</p>
  </div>

  <div class="tab-container" style="margin-top: 20px;">
    <div class="tab-header" style="display: flex; gap: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
      <button class="tab-btn active" onclick="showTab('ricoh')">Ricoh</button>
      <button class="tab-btn" onclick="showTab('toshiba')">Toshiba</button>
      <button class="tab-btn" onclick="showTab('fujifilm')">Fujifilm</button>
    </div>

    <!-- RICOH TAB -->
    <div id="tab-ricoh" class="tab-content" style="padding-top: 20px;">
      <div style="margin-bottom: 15px;">
        <input type="text" id="ricoh-search" placeholder="Search Ricoh models (e.g. MP 3054)..." 
               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;"
               onkeyup="filterRicoh()">
      </div>
      
      <div id="ricoh-listbox" style="max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px;">
        <!-- Models will be injected here -->
      </div>
    </div>

    <!-- TOSHIBA TAB -->
    <div id="tab-toshiba" class="tab-content" style="padding-top: 20px; display: none;">
      <p style="color: #666; font-style: italic;">Toshiba driver database integration pending...</p>
      <a href="https://business.toshiba.com/support/" target="_blank" class="filter-btn ghost">Go to Toshiba Support</a>
    </div>

    <!-- FUJIFILM TAB -->
    <div id="tab-fujifilm" class="tab-content" style="padding-top: 20px; display: none;">
      <p style="color: #666; font-style: italic;">Fujifilm (ApeosPort) driver database integration pending...</p>
      <a href="https://support-fb.fujifilm.com/" target="_blank" class="filter-btn ghost">Go to Fujifilm Support</a>
    </div>
  </div>
</section>

<style>
  .tab-btn {
    padding: 8px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-weight: 600;
    color: #666;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--color-primary, #3b82f6);
    border-bottom-color: var(--color-primary, #3b82f6);
  }
  .driver-item {
    padding: 12px 15px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s;
  }
  .driver-item:hover {
    background: #f9f9f9;
  }
  .driver-item:last-child {
    border-bottom: none;
  }
  .model-name {
    font-weight: 500;
    color: #333;
  }
  .download-ico {
    color: var(--color-primary, #3b82f6);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
</style>

function renderRicoh(models) {
  const container = document.getElementById('ricoh-listbox');
  if (models.length === 0) {
    container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No models found</div>';
    return;
  }
  container.innerHTML = models.map(m => {
    // Generate deeper link for Ricoh Support
    const cleanSlug = m.slug.toLowerCase();
    
    // The standard /re2/model/ usually works as a redirect or direct hit on support site
    const deepUrl = `https://support.ricoh.com/bb/html/dr_ut_e/re2/model/${cleanSlug}/${cleanSlug}.htm?lang=en`;
    
    return `
      <div class="driver-item" onclick="window.open('${deepUrl}', '_blank')">
        <span class="model-name">${m.name}</span>
        <span class="download-ico">Download <span style="font-family: Arial, sans-serif;">&rarr;</span></span>
      </div>
    `;
  }).join('');
}

function filterRicoh() {
  const q = document.getElementById('ricoh-search').value.toLowerCase();
  const filtered = ricohModels.filter(m => m.name.toLowerCase().includes(q));
  renderRicoh(filtered);
}

function showTab(tabId) {
  // Update buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.innerText.toLowerCase() === tabId) btn.classList.add('active');
  });
  // Update content
  document.querySelectorAll('.tab-content').forEach(content => {
    content.style.display = 'none';
  });
  document.getElementById('tab-' + tabId).style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  renderRicoh(ricohModels);
});
</script>
