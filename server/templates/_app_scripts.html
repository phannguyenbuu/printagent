<script>
async function jget(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

function qs(id) { return document.getElementById(id); }
function getGlobalFilters() {
  return {
    lead: (qs("global-filter-lead")?.value || "").trim(),
    printer_name: (qs("global-filter-printer-name")?.value || "").trim(),
    printer_type: (qs("global-filter-printer-type")?.value || "").trim(),
    favorite: (qs("global-filter-favorite")?.value || "").trim(),
    time_scope: (qs("global-filter-time-scope")?.value || "").trim(),
    datetime_from: (qs("global-filter-datetime-from")?.value || "").trim(),
    datetime_to: (qs("global-filter-datetime-to")?.value || "").trim(),
  };
}
function saveGlobalFilters() {
  try { localStorage.setItem("goprinx_filters", JSON.stringify(getGlobalFilters())); } catch (_) {}
}
function restoreGlobalFilters() {
  try {
    const raw = localStorage.getItem("goprinx_filters");
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || typeof data !== "object") return;
    if (qs("global-filter-lead")) qs("global-filter-lead").value = data.lead || "default";
    if (qs("global-filter-printer-name")) qs("global-filter-printer-name").value = data.printer_name || "";
    if (qs("global-filter-printer-type")) qs("global-filter-printer-type").value = data.printer_type || "";
    if (qs("global-filter-favorite")) qs("global-filter-favorite").value = data.favorite || "";
    if (qs("global-filter-time-scope")) qs("global-filter-time-scope").value = data.time_scope || "month";
    if (qs("global-filter-datetime-from")) qs("global-filter-datetime-from").value = data.datetime_from || "";
    if (qs("global-filter-datetime-to")) qs("global-filter-datetime-to").value = data.datetime_to || "";
  } catch (_) {}
}

function updateSpecifiedRangeVisibility() {
  const scope = (qs("global-filter-time-scope")?.value || "").trim();
  const isSpecified = scope === "specified";
  const fromWrap = qs("global-filter-datetime-from-wrap");
  const toWrap = qs("global-filter-datetime-to-wrap");
  if (fromWrap) fromWrap.hidden = !isSpecified;
  if (toWrap) toWrap.hidden = !isSpecified;
}

async function loadLeadOptions(preferredLead = "") {
  const select = qs("global-filter-lead");
  if (!select) return;
  let dbLeads = [];
  try {
    const data = await jget("/api/leads");
    if (data && Array.isArray(data.leads)) dbLeads = data.leads;
  } catch (_) {
    dbLeads = [];
  }
  const uniqueLeads = Array.from(
    new Set(
      dbLeads
        .map((x) => String(x || "").trim())
        .filter((x) => Boolean(x))
    )
  ).sort((a, b) => a.localeCompare(b));

  const finalLeads = ["default", ...uniqueLeads.filter((x) => x !== "default")];
  select.innerHTML = "";
  finalLeads.forEach((lead) => {
    const option = document.createElement("option");
    option.value = lead;
    option.textContent = lead;
    select.appendChild(option);
  });
  const allOption = document.createElement("option");
  allOption.value = "";
  allOption.textContent = "all";
  select.appendChild(allOption);

  const preferred = String(preferredLead || "").trim();
  if (preferred === "" || finalLeads.includes(preferred)) {
    select.value = preferred;
  } else {
    select.value = "default";
  }
}
function defaultUiConfig() {
  return { chart_columns: 2, card_columns: 5, card_rows: 4, pages_window: 30, paging_per_day: 1, auto_refresh_seconds: 60 };
}
function loadUiConfig() {
  try {
    const raw = localStorage.getItem("goprinx_ui_config");
    if (!raw) return defaultUiConfig();
    return { ...defaultUiConfig(), ...JSON.parse(raw) };
  } catch (_) {
    return defaultUiConfig();
  }
}
function saveUiConfig(cfg) {
  localStorage.setItem("goprinx_ui_config", JSON.stringify(cfg));
}
function applyUiConfig(cfg) {
  document.documentElement.style.setProperty("--chart-columns", String(cfg.chart_columns || 2));
  document.documentElement.style.setProperty("--timelapse-card-columns", String(cfg.card_columns || 5));
  state.autoRefresh.intervalMs = Math.max(5000, Number(cfg.auto_refresh_seconds || 60) * 1000);
}
function fmtNumber(v) {
  if (v === null || v === undefined || v === "") return "-";
  const n = Number(v);
  if (!Number.isFinite(n)) return String(v);
  return n.toLocaleString("en-US");
}
function fmtTimestampGmt7(value) {
  if (!value) return "-";
  if (String(value).length === 10) return value; // Already YYYY-MM-DD
  const dt = new Date(value);
  if (Number.isNaN(dt.getTime())) return String(value);
  const shifted = new Date(dt.getTime() + 7 * 60 * 60 * 1000);
  const iso = shifted.toISOString().replace("T", " ");
  return `${iso.slice(0, 19)} GMT+7`;
}

function fmtDateGmt7(value) {
  if (!value) return "-";
  if (String(value).length === 10) return value;
  const dt = new Date(value);
  if (Number.isNaN(dt.getTime())) return String(value);
  const shifted = new Date(dt.getTime() + 7 * 60 * 60 * 1000);
  return shifted.toISOString().slice(0, 10);
}

function startOfTodayGmt7Ms() {
  const offsetMs = 7 * 60 * 60 * 1000;
  const now = Date.now();
  const shifted = new Date(now + offsetMs);
  const y = shifted.getUTCFullYear();
  const m = shifted.getUTCMonth();
  const d = shifted.getUTCDate();
  return Date.UTC(y, m, d, 0, 0, 0, 0) - offsetMs;
}

function inforRowTimeMs(row) {
  const raw = row?.updated_at || row?.last_counter_at || row?.createAt || row?.created_at || "";
  const ms = new Date(raw).getTime();
  return Number.isFinite(ms) ? ms : 0;
}

function inforRowCounterTotal(row) {
  const counter = row?.counter_data && typeof row.counter_data === "object"
    ? row.counter_data
    : (row?.counter && typeof row.counter === "object" ? row.counter : {});
  const n = Number(row?.counter_total ?? counter?.total ?? 0);
  return Number.isFinite(n) ? n : 0;
}

function buildPrintedPaperBaseline(rows) {
  const startMs = startOfTodayGmt7Ms();
  const baseline = {};
  for (const row of rows || []) {
    const lan = String(row?.lan_uid || "").trim();
    const mac = String(row?.mac_id || "").trim().toUpperCase();
    if (!lan || !mac || mac === "UNKNOWN" || mac === "-") continue;
    const t = inforRowTimeMs(row);
    if (!t || t < startMs) continue;
    const total = inforRowCounterTotal(row);
    const key = `${lan}||${mac}`;
    const cur = baseline[key];
    if (!cur || t < cur.t) baseline[key] = { t, total };
  }
  return baseline;
}

function fmtCompact(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return String(value ?? "");
  if (Math.abs(n) >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
  if (Math.abs(n) >= 1000) return `${(n / 1000).toFixed(1)}k`;
  return `${Math.round(n)}`;
}

function openUpsertModal(title, fields, onSave, initialData = null) {
  const modal = qs("upsert-modal");
  const titleEl = qs("upsert-title");
  const bodyEl = qs("upsert-form-body");
  if (!modal || !bodyEl) return;

  titleEl.textContent = title;
  bodyEl.innerHTML = fields.map(f => {
    const val = initialData ? (initialData[f.name] ?? "") : (f.default ?? "");
    let inputHtml = "";
    if (f.type === "select") {
      inputHtml = `<select name="${f.name}">${f.options.map(opt => `<option value="${opt.value}" ${String(opt.value) === String(val) ? "selected" : ""}>${opt.label}</option>`).join("")}</select>`;
    } else if (f.type === "textarea") {
      inputHtml = `<textarea name="${f.name}" rows="3">${escapeHtml(val)}</textarea>`;
    } else if (f.type === "checkbox") {
      inputHtml = `<input type="checkbox" name="${f.name}" ${val ? "checked" : ""} style="width: auto;">`;
    } else {
      inputHtml = `<input type="${f.type || "text"}" name="${f.name}" value="${escapeHtml(val)}">`;
    }
    return `<label class="upsert-field"><span>${f.label}</span>${inputHtml}</label>`;
  }).join("");

  modal.hidden = false;
  
  const okBtn = qs("upsert-ok");
  const cancelBtn = qs("upsert-cancel");
  
  const handleSave = async () => {
    const data = {};
    bodyEl.querySelectorAll("input, select, textarea").forEach(el => {
      if (el.type === "checkbox") data[el.name] = el.checked;
      else data[el.name] = el.value;
    });
    okBtn.disabled = true;
    try {
      await onSave(data);
      closeUpsertModal();
    } catch (err) {
      window.alert(err.message || "Save failed");
    } finally {
      okBtn.disabled = false;
    }
  };

  okBtn.onclick = handleSave;
  cancelBtn.onclick = closeUpsertModal;
}

function closeUpsertModal() {
  const modal = qs("upsert-modal");
  if (modal) modal.hidden = true;
}

function upsertChart(id, type, data, options) {
  const canvas = qs(id);
  if (!canvas || typeof Chart === "undefined") return;
  if (state.charts[id]) state.charts[id].destroy();
  const isCircle = type === "pie" || type === "doughnut" || type === "polarArea" || type === "radar";
  canvas.classList.toggle("chart-circle", isCircle);
  canvas.classList.toggle("chart-rect", !isCircle);
  const baseOptions = {
    maintainAspectRatio: isCircle,
    aspectRatio: isCircle ? 1 : 2,
    plugins: {
      legend: { labels: { color: CHART_THEME.text, font: { size: 10 } } },
      tooltip: {
        enabled: true,
        backgroundColor: CHART_THEME.tooltipBg,
        titleColor: CHART_THEME.text,
        bodyColor: CHART_THEME.mutedText,
        borderColor: "rgba(132, 163, 240, 0.55)",
        borderWidth: 1,
      },
    },
    elements: {
      line: { borderWidth: 2.4 },
      point: { radius: 2.4, hoverRadius: 4.5 },
      arc: { borderWidth: 0 },
    },
  };
  if (type === "radar") {
    baseOptions.scales = {
      r: {
        ticks: { color: CHART_THEME.mutedText, backdropColor: "rgba(0, 0, 0, 0)", callback: (v) => fmtCompact(v) },
        angleLines: { color: CHART_THEME.grid },
        grid: { color: CHART_THEME.grid },
        pointLabels: { color: CHART_THEME.text, font: { size: 10 } },
      },
    };
  } else if (!isCircle) {
    baseOptions.scales = {
      x: { ticks: { color: CHART_THEME.text, font: { size: 10 }, maxRotation: 0, autoSkip: true }, grid: { color: CHART_THEME.grid } },
      y: { ticks: { color: CHART_THEME.text, font: { size: 10 }, callback: (v) => fmtCompact(v), maxTicksLimit: 7 }, grid: { color: CHART_THEME.grid } },
    };
  }
  state.charts[id] = new Chart(canvas, { type, data, options: { ...baseOptions, ...(options || {}) }, plugins: [valueLabelPlugin] });
}

const valueLabelPlugin = {
  id: "valueLabelPlugin",
  afterDatasetsDraw(chart) {
    if (chart.config.type === "radar" || chart.config.type === "polarArea") return;
    const { ctx } = chart;
    ctx.save();
    ctx.fillStyle = "#eefdff";
    ctx.font = "10px Arial";
    chart.data.datasets.forEach((dataset, i) => {
      const meta = chart.getDatasetMeta(i);
      if (!meta || meta.hidden) return;
      meta.data.forEach((elem, idx) => {
        const value = dataset.data[idx];
        if (value === null || value === undefined) return;
        const pos = elem.tooltipPosition();
        ctx.textAlign = "center";
        ctx.fillText(fmtNumber(value), pos.x, pos.y - 8);
      });
    });
    ctx.restore();
  },
};

function currentPage() {

function renderPager(pageId, currentPageValue, totalPagesValue, onSelectPage) {
  const host = qs(pageId);
  if (!host) return;
  const totalPages = Math.max(1, Number(totalPagesValue || 1));
  const currentPage = Math.min(totalPages, Math.max(1, Number(currentPageValue || 1)));
  
  const buttons = [];
  const maxVisible = 5; // Number of visible page buttons (excluding first/last and ellipsis)

  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) buttons.push(i);
  } else {
    buttons.push(1);
    
    let start = Math.max(2, currentPage - 1);
    let end = Math.min(totalPages - 1, currentPage + 1);

    if (currentPage <= 3) {
      end = 4;
    } else if (currentPage >= totalPages - 2) {
      start = totalPages - 3;
    }

    if (start > 2) buttons.push("...");
    for (let i = start; i <= end; i++) buttons.push(i);
    if (end < totalPages - 1) buttons.push("...");
    
    buttons.push(totalPages);
  }

  host.innerHTML = buttons
    .map((p) => {
      if (p === "...") return `<span class="pager-ellipsis">...</span>`;
      return `<button type="button" class="pager-page-btn ${p === currentPage ? "active" : ""}" data-page="${p}">${p}</button>`;
    })
    .join("");

  host.querySelectorAll(".pager-page-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const targetPage = Number(btn.dataset.page || 1);
      if (targetPage === currentPage) return;
      onSelectPage(targetPage);
    });
  });
}

function refreshCurrentPage() {
  const page = currentPage();
  if (page === "dashboard") return loadSummary();
  if (page === "devices" || page === "infor") return loadDevicesPage();
  if (page === "api_docs") return initApiTests(false);
  if (page === "counter") return loadCounter();
  if (page === "status") return loadStatus();
  if (page === "heatmap") return loadHeatmap();
  return Promise.resolve();
}

async function loadApiTestContext() {
  const context = { lead: "default", lan_uid: "", mac_id: "" };
  try {
    const all = await jget("/all/?lead=default");
    const rows = Array.isArray(all?.rows) ? all.rows : [];
    if (rows.length) {
      const first = rows[0] || {};
      context.lead = String(first.lead || "default").trim() || "default";
      context.lan_uid = String(first.lan_uid || "").trim();
      const withMac = rows.find((x) => String(x?.mac_id || "").trim() && String(x?.mac_id || "").toLowerCase() !== "unknown");
      context.mac_id = String((withMac || first).mac_id || "").trim();
    }
  } catch (_) {}
  if (!context.lan_uid) {
    try {
      const net = await jget("/networklist/?lead=default");
      const rows = Array.isArray(net?.networks) ? net.networks : [];
      if (rows.length) {
        context.lead = String(rows[0].lead || context.lead).trim() || context.lead;
        context.lan_uid = String(rows[0].lan_uid || "").trim();
      }
    } catch (_) {}
  }
  if (!context.mac_id) {
    try {
      const machines = await jget("/machinelist/?lead=default");
      const rows = Array.isArray(machines?.machines) ? machines.machines : [];
      const withMac = rows.find((x) => String(x?.mac_id || "").trim() && String(x?.mac_id || "").toLowerCase() !== "unknown");
      if (withMac) context.mac_id = String(withMac.mac_id || "").trim();
      if (!context.lan_uid && withMac) context.lan_uid = String(withMac.lan_uid || "").trim();
      if (!context.lead && withMac) context.lead = String(withMac.lead || "").trim() || "default";
    } catch (_) {}
  }
  return context;
}

function buildApiTestUrl(key, ctx) {
  const lead = encodeURIComponent(ctx.lead || "default");
  const lan = encodeURIComponent(ctx.lan_uid || "");
  const mac = encodeURIComponent(ctx.mac_id || "");
  if (key === "machinelist") return `/machinelist/?lead=${lead}`;
  if (key === "networklist") return `/networklist/?lead=${lead}`;
  if (key === "infor") return `/api/infor/list?lead=${lead}`;
  if (key === "by-mac") return mac ? `/api/public/device/by-mac?mac_id=${mac}` : "";
  if (key === "by-lan") return lan ? `/api/public/network/by-lan?lan_uid=${lan}&lead=${lead}` : "";
  if (key === "all") return `/all/?lead=${lead}`;
  
  if (key.startsWith("workspaces-")) {
    if (key === "workspaces-list") return `/api/workspaces?lead=${lead}`;
    if (key === "workspaces-create") return `/api/workspaces`;
    if (key === "workspaces-update") return `/api/workspaces/test-ws`;
    if (key === "workspaces-delete") return `/api/workspaces/test-ws`;
  }
  if (key.startsWith("locations-")) {
    if (key === "locations-list") return `/api/locations?lead=${lead}`;
    if (key === "locations-create") return `/api/locations`;
    if (key === "locations-update") return `/api/locations/test-loc`;
    if (key === "locations-delete") return `/api/locations/test-loc`;
  }
  if (key.startsWith("materials-")) {
    if (key === "materials-list") return `/api/materials?lead=${lead}`;
    if (key === "materials-create") return `/api/materials`;
    if (key === "materials-update") return `/api/materials/test-mat`;
    if (key === "materials-delete") return `/api/materials/test-mat`;
  }
  if (key.startsWith("users-")) {
    if (key === "users-list") return `/api/users?lead=${lead}`;
    if (key === "users-create") return `/api/users`;
    if (key === "users-update") return `/api/users/999999`;
    if (key === "users-delete") return `/api/users/999999`;
  }
  if (key.startsWith("tasks-")) {
    if (key === "tasks-list") return `/api/tasks?lead=${lead}`;
    if (key === "tasks-create") return `/api/tasks`;
    if (key === "tasks-update") return `/api/tasks/999999`;
    if (key === "tasks-delete") return `/api/tasks/999999`;
  }
  if (key.startsWith("leads-")) {
    if (key === "leads-list") return `/api/leads/list?lead=${lead}`;
    if (key === "leads-create") return `/api/leads`;
    if (key === "leads-update") return `/api/leads/test-lead`;
    if (key === "leads-delete") return `/api/leads/test-lead`;
  }
  if (key === "lan-sites-list") return `/api/lan-sites?lead=${lead}`;

  if (key === "workspaces") return `/api/workspaces?lead=${lead}`;
  if (key === "locations") return `/api/locations?lead=${lead}`;
  if (key === "materials") return `/api/materials?lead=${lead}`;
  if (key === "users") return `/api/users?lead=${lead}`;
  if (key === "tasks") return `/api/tasks?lead=${lead}`;
  return "";
}

async function runApiTest(key, ctx) {
  const output = qs("api-test-output");
  const url = buildApiTestUrl(key, ctx);
  if (!url) {
    setApiTestStatus(key, "fail", "FAIL (missing sample)");
    if (output) output.textContent = `[${key}] Missing sample data (lan_uid/mac_id) to run this API test.`;
    return false;
  }

  let method = "GET";
  let body = null;

  if (key.endsWith("-create")) {
    method = "POST";
    body = { name: "Test Item", lead: "default", username: "testuser", machine_name: "Test Machine", title: "Test Title" };
  } else if (key.endsWith("-update")) {
    method = "PATCH";
    body = { name: "Updated Item", full_name: "Updated Name" };
  } else if (key.endsWith("-delete")) {
    method = "DELETE";
  }

  setApiTestStatus(key, "idle", "Testing...");
  try {
    const options = { method };
    if (body) {
      options.headers = { "Content-Type": "application/json" };
      options.body = JSON.stringify(body);
    }

    const res = await fetch(url, options);
    const text = await res.text();
    const preview = text.length > 1200 ? `${text.slice(0, 1200)}\n...` : text;
    if (res.ok) {
      setApiTestStatus(key, "ok", `${method} OK ${res.status}`);
      if (output) output.textContent = `[${key}] ${method} ${url}\nStatus: ${res.status}\n\n${preview}`;
      return true;
    }
    setApiTestStatus(key, "fail", `${method} FAIL ${res.status}`);
    if (output) output.textContent = `[${key}] ${method} ${url}\nStatus: ${res.status}\n\n${preview}`;
    return false;
  } catch (err) {
    const msg = err && err.message ? err.message : "Network error";
    setApiTestStatus(key, "fail", "FAIL");
    if (output) output.textContent = `[${key}] ${method} ${url}\nError: ${msg}`;
    return false;
  }
}

async function initApiTests(resetStatuses = true) {
  const page = currentPage();
  if (page !== "api_docs") return;
  const global = qs("api-test-global-status");
  const output = qs("api-test-output");
  const buttons = Array.from(document.querySelectorAll(".api-test-btn"));
  const allBtn = qs("api-test-all-btn");
  const keys = [
    "machinelist", "networklist", "infor", "by-mac", "by-lan", "all",
    "workspaces-list", "workspaces-create", "workspaces-update", "workspaces-delete",
    "locations-list", "locations-create", "locations-update", "locations-delete",
    "materials-list", "materials-create", "materials-update", "materials-delete",
    "users-list", "users-create", "users-update", "users-delete",
    "tasks-list", "tasks-create", "tasks-update", "tasks-delete",
    "leads-list", "leads-create", "leads-update", "leads-delete",
    "lan-sites-list"
  ];
  if (resetStatuses) {
    keys.forEach((key) => setApiTestStatus(key, "idle", "-"));
    if (global) {
      global.classList.remove("ok", "fail");
      global.classList.add("idle");
      global.textContent = "Ready";
    }
    if (output) output.textContent = "Click Test to run API check...";
  }
  const ctx = await loadApiTestContext();
  if (allBtn && allBtn.dataset.bound !== "1") {
    buttons.forEach((btn) => {
      btn.addEventListener("click", async () => {
        const key = btn.dataset.apiKey || "";
        if (!key) return;
        await runApiTest(key, await loadApiTestContext());
      });
    });
    allBtn.addEventListener("click", async () => {
      const liveCtx = await loadApiTestContext();
    if (global) {
      global.classList.remove("ok", "fail", "idle");
      global.classList.add("idle");
      global.textContent = "Running...";
    }
    let okCount = 0;
    for (const key of keys) {
      const ok = await runApiTest(key, liveCtx);
      if (ok) okCount += 1;
    }
    const allOk = okCount === keys.length;
    if (global) {
      global.classList.remove("ok", "fail", "idle");
      global.classList.add(allOk ? "ok" : "fail");
      global.textContent = allOk ? `OK (${okCount}/${keys.length})` : `FAIL (${okCount}/${keys.length})`;
    }
    });
    allBtn.dataset.bound = "1";
  }
}

function stopAutoRefresh() {
  if (state.autoRefresh.timerId) {
    window.clearInterval(state.autoRefresh.timerId);
    state.autoRefresh.timerId = null;
  }
}

function startAutoRefresh() {
  stopAutoRefresh();
  if (!state.autoRefresh.enabled) {
    updateAutoRefreshStateText();
    return;
  }
  state.autoRefresh.timerId = window.setInterval(() => {
    if (document.hidden) return;
    refreshCurrentPage().catch(() => {});
  }, state.autoRefresh.intervalMs);
  updateAutoRefreshStateText();
}

async function toggleDeviceEnabled(row, desiredEnabled, inputNode) {
  const creds = await openDeviceAuthDialog(row.user || "", row.password || "");
  if (!creds) {
    if (inputNode) inputNode.checked = !desiredEnabled;
    return;
  }
  const authUser = String(creds.user || "").trim();
  const authPassword = String(creds.password || "").trim();
  try {
    const res = await fetch(`/api/devices/${row.id}/enable`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ enabled: desiredEnabled, auth_user: authUser, auth_password: authPassword }),
    });
    if (!res.ok) {
      const payload = await res.json().catch(() => ({}));
      throw new Error(payload.error || `HTTP ${res.status}`);
    }
    await loadDevicesPage();
  } catch (err) {
    if (inputNode) inputNode.checked = !desiredEnabled;
    const msg = err && err.message ? err.message : "Enable/Disable failed";
    window.alert(msg);
  }
}

function initDevicesPaging() {
  const prev = qs("devices-prev");
  const next = qs("devices-next");
  const limitSelect = qs("devices-limit");
  if (prev && !prev.dataset.bound) {
    prev.addEventListener("click", () => {
      if (state.devices.page > 1) {
        state.devices.page -= 1;
        loadDevicesPage();
      }
    });
    prev.dataset.bound = "1";
  }
  if (next && !next.dataset.bound) {
    next.addEventListener("click", () => {
      if (state.devices.page < state.devices.totalPages) {
        state.devices.page += 1;
        loadDevicesPage();
      }
    });
    next.dataset.bound = "1";
  }
  if (limitSelect && !limitSelect.dataset.bound) {
    limitSelect.value = state.devices.limit;
    limitSelect.addEventListener("change", () => {
      state.devices.limit = Number(limitSelect.value);
      state.devices.page = 1;
      loadDevicesPage();
    });
    limitSelect.dataset.bound = "1";
  }
}

      const total = Number(r.counter_total || counter.total || 0);
      const printedKey = `${String(r.lan_uid || "").trim()}||${String(r.mac_id || "").trim().toUpperCase()}`;

      const statusLine = systemStatus.length > 140 ? `${systemStatus.slice(0, 140)}...` : systemStatus;
      const createAt = String(r.createAt || r.created_at || "");
      const counterPreview = JSON.stringify(counter || {}, null, 2);
      const statusPreview = JSON.stringify(status || {}, null, 2);
      const cardStateClass = r.is_latest ? "latest" : "stale";
      return `<article class="counter-card ${cardStateClass} infor-card" data-kind="infor-card" data-id="${rowId}">

function openInforDetailModal(row) {
  const modal = qs("detail-modal");
  const body = qs("detail-modal-body");
  if (!modal || !body || !row) return;

  const counter = row.counter_data && typeof row.counter_data === "object"
    ? row.counter_data
    : (row.counter && typeof row.counter === "object" ? row.counter : {});
  const status = row.status_data && typeof row.status_data === "object"
    ? row.status_data
    : (row.status && typeof row.status === "object" ? row.status : {});

  const generalPairs = [
    ["ID", row.id || "-"],
    ["Lead", row.lead || "-"],
    ["LAN UID", row.lan_uid || "-"],
    ["Agent UID", row.agent_uid || "-"],
    ["Printer", row.printer_name || "-"],
    ["IP", row.ip || "-"],
    ["MAC ID", row.mac_id || "-"],
    ["CreateAt", fmtDateGmt7(row.createAt || row.created_at || "")],
    ["Updated", fmtTimestampGmt7(row.updated_at || "")],
    ["Counter Total", fmtNumber(row.counter_total || 0)],
    ["Printed Paper", (() => {
      const allRows = Array.isArray(state.devices.rows) ? state.devices.rows : [];
      const baseline = buildPrintedPaperBaseline(allRows);
      const total = inforRowCounterTotal(row);
      const key = `${String(row.lan_uid || "").trim()}||${String(row.mac_id || "").trim().toUpperCase()}`;
      const base = baseline[key];
      return fmtNumber(Math.max(0, Math.round(total - Number(base?.total || total))));
    })()],
  ];
  const renderPairs = (pairs) =>
    pairs
      .map(([k, v]) => `<div class="counter-kv"><span class="counter-k">${escapeHtml(String(k))}</span><span class="counter-v">${escapeHtml(String(v ?? "-"))}</span></div>`)
      .join("");

async function loadHeatmap() {
  const lead = (qs("global-filter-lead")?.value || "").trim();
  const mode = (qs("trend-mode")?.value || "day").trim();
  const dateFrom = (qs("trend-date-from")?.value || "").trim();
  const dateTo = (qs("trend-date-to")?.value || "").trim();
  const printerIp = (qs("trend-printer-ip")?.value || "").trim();
  const query = new URLSearchParams({
    lead,
    mode,
    date_from: dateFrom,
    date_to: dateTo,
    ip: printerIp,
  });
  const data = await jget(`/api/counter/trend?${query.toString()}`);
  const labels = Array.isArray(data.labels) ? data.labels : [];
  const series = Array.isArray(data.series) ? data.series : [];

  const datasets = series.map((row, idx) => ({
    label: `${row.printer_name || "Unknown"} (${row.ip || "-"})`,
    data: Array.isArray(row.values) ? row.values : [],
    borderColor: CHART_THEME.neonSeries[idx % CHART_THEME.neonSeries.length],
    backgroundColor: "transparent",
    tension: 0.25,
    pointRadius: 2,
    pointHoverRadius: 4,
    borderWidth: 2,
    fill: false,
  }));

  upsertChart("trend-chart", "line", {
    labels,
    datasets,
  }, {
    maintainAspectRatio: false,
    scales: {
      x: { ticks: { color: CHART_THEME.text, font: { size: 10 }, maxRotation: 0 }, grid: { color: CHART_THEME.grid } },
      y: { ticks: { color: CHART_THEME.text, callback: (v) => fmtCompact(v) }, grid: { color: CHART_THEME.grid } },
    },
  });

  const meta = qs("trend-meta");
  if (meta) {
    meta.textContent = `Mode: ${String(data.mode || mode).toUpperCase()} | Range: ${data.date_from || "-"} -> ${data.date_to || "-"} | Printers: ${fmtNumber(data.printers || series.length)} | Buckets: ${fmtNumber(labels.length)}`;
  }

  const tableWrap = qs("trend-table-wrap");
  if (tableWrap) {
    if (!series.length) {
      tableWrap.innerHTML = `<div class="meta-line">No trend data in selected range.</div>`;
    } else {
      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr><th>Printer</th><th>IP</th><th>Total Printed (range)</th><th>Average / bucket</th></tr>
          </thead>
          <tbody>
            ${series
              .map((row) => {
                const values = Array.isArray(row.values) ? row.values : [];
                const sum = values.reduce((a, b) => a + Number(b || 0), 0);
                const avg = values.length ? Math.round(sum / values.length) : 0;
                return `<tr>
                  <td>${escapeHtml(row.printer_name || "-")}</td>
                  <td>${escapeHtml(row.ip || "-")}</td>
                  <td>${fmtNumber(sum)}</td>
                  <td>${fmtNumber(avg)}</td>
                </tr>`;
              })
              .join("")}
          </tbody>
        </table>
      `;
    }
  }
}

  await loadLeadOptions(restoredLead || "default");
  const uiConfig = loadUiConfig();
  applyUiConfig(uiConfig);
  qs("global-filter-apply")?.addEventListener("click", () => {
    const scope = (qs("global-filter-time-scope")?.value || "").trim();
    const fromValue = (qs("global-filter-datetime-from")?.value || "").trim();
    const toValue = (qs("global-filter-datetime-to")?.value || "").trim();
    if (scope === "specified") {
      if (!fromValue || !toValue) {
        window.alert("Please select both Datetime From and Datetime To.");
        return;
      }
      if (fromValue > toValue) {
        window.alert("Datetime From must be earlier than Datetime To.");
        return;
      }
    }
    saveGlobalFilters();
    if (page === "counter") state.counter.page = 1;
    if (page === "status") state.status.page = 1;
    if (page === "heatmap") state.heatmap.page = 1;
    refreshCurrentPage().catch(() => {});
  });
  qs("global-filter-reset")?.addEventListener("click", () => {
    if (qs("global-filter-lead")) qs("global-filter-lead").value = "default";
    if (qs("global-filter-printer-name")) qs("global-filter-printer-name").value = "";
    if (qs("global-filter-printer-type")) qs("global-filter-printer-type").value = "";
    if (qs("global-filter-favorite")) qs("global-filter-favorite").value = "";
    if (qs("global-filter-time-scope")) qs("global-filter-time-scope").value = "month";
    if (qs("global-filter-datetime-from")) qs("global-filter-datetime-from").value = "";
    if (qs("global-filter-datetime-to")) qs("global-filter-datetime-to").value = "";
    updateSpecifiedRangeVisibility();
    saveGlobalFilters();
    if (page === "counter") state.counter.page = 1;
    if (page === "status") state.status.page = 1;
    if (page === "heatmap") state.heatmap.page = 1;
    refreshCurrentPage().catch(() => {});
  });
  qs("refresh-btn")?.addEventListener("click", () => {
    refreshCurrentPage().catch(() => {});
  });
  qs("confirm-no")?.addEventListener("click", closeDeleteConfirm);
  qs("confirm-yes")?.addEventListener("click", async () => {
    const fn = state.pendingDelete;
    if (!fn) return closeDeleteConfirm();
    try {
      await fn();
    } catch (_) {
      closeDeleteConfirm();
    }
  });
  qs("confirm-modal")?.addEventListener("click", (event) => {
    if (event.target && event.target.classList && event.target.classList.contains("confirm-backdrop")) {
      closeDeleteConfirm();
    }
  });
  qs("detail-modal")?.addEventListener("click", (event) => {
    if (event.target && event.target.classList && event.target.classList.contains("detail-backdrop")) {
      closeDetailModal();
    }
  });
  qs("device-auth-ok")?.addEventListener("click", () => {
    const user = (qs("device-auth-dialog-user")?.value || "").trim();
    const password = (qs("device-auth-dialog-password")?.value || "").trim();
    if (!user || !password) {
      window.alert("Please enter both User and Password.");
      return;
    }
    closeDeviceAuthDialog({ user, password });
  });
  qs("device-auth-cancel")?.addEventListener("click", () => {
    closeDeviceAuthDialog(null);
  });
  qs("device-auth-modal")?.addEventListener("click", (event) => {
    if (event.target && event.target.classList && event.target.classList.contains("confirm-backdrop")) {
      closeDeviceAuthDialog(null);
    }
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeDetailModal();
      closeDeviceAuthDialog(null);
    }
  });
  qs("auto-refresh-toggle")?.addEventListener("change", (event) => {
    state.autoRefresh.enabled = Boolean(event.target?.checked);
    startAutoRefresh();
  });
  qs("auto-refresh-interval")?.addEventListener("change", (event) => {
    const raw = Number(event.target?.value || 60000);
    state.autoRefresh.intervalMs = Number.isFinite(raw) && raw > 0 ? raw : 60000;
    startAutoRefresh();
  });
  qs("global-filter-time-scope")?.addEventListener("change", () => {
    updateSpecifiedRangeVisibility();
  });

  if (page === "dashboard") loadSummary().catch(() => {});
  if (page === "devices" || page === "infor") loadDevicesPage().catch(() => {});
  if (page === "api_docs") initApiTests(true).catch(() => {});
  if (page === "devices" || page === "infor") {
    // initDevicesPaging() is called inside loadDevicesPage()
  }
  if (page === "configs") {
    qs("cfg-chart-columns").value = String(uiConfig.chart_columns);
    qs("cfg-card-columns").value = String(uiConfig.card_columns);
    qs("cfg-card-rows").value = String(uiConfig.card_rows);
    qs("cfg-pages-window").value = String(uiConfig.pages_window);
    qs("cfg-paging-per-day").value = String(uiConfig.paging_per_day);
    qs("cfg-auto-refresh").value = String(uiConfig.auto_refresh_seconds);
    qs("cfg-save")?.addEventListener("click", () => {
      const next = {
        chart_columns: Number(qs("cfg-chart-columns")?.value || 2),
        card_columns: Number(qs("cfg-card-columns")?.value || 5),
        card_rows: Number(qs("cfg-card-rows")?.value || 4),
        pages_window: Number(qs("cfg-pages-window")?.value || 30),
        paging_per_day: Number(qs("cfg-paging-per-day")?.value || 1),
        auto_refresh_seconds: Number(qs("cfg-auto-refresh")?.value || 60),
      };
      saveUiConfig(next);
      applyUiConfig(next);
      qs("cfg-note").textContent = "Saved.";
      startAutoRefresh();
    });
    qs("cfg-reset")?.addEventListener("click", () => {
      const d = defaultUiConfig();
      saveUiConfig(d);
      applyUiConfig(d);
      qs("cfg-chart-columns").value = String(d.chart_columns);
      qs("cfg-card-columns").value = String(d.card_columns);
      qs("cfg-card-rows").value = String(d.card_rows);
      qs("cfg-pages-window").value = String(d.pages_window);
      qs("cfg-paging-per-day").value = String(d.paging_per_day);
      qs("cfg-auto-refresh").value = String(d.auto_refresh_seconds);
      qs("cfg-note").textContent = "Reset to default.";
      startAutoRefresh();
    });
  }
  if (page === "counter") {
    qs("counter-prev")?.addEventListener("click", () => { state.counter.page = Math.max(1, state.counter.page - 1); loadCounter(); });
    qs("counter-next")?.addEventListener("click", () => { state.counter.page = Math.min(state.counter.totalPages, state.counter.page + 1); loadCounter(); });
    loadCounter().catch(() => {});
  }
  if (page === "status") {
    qs("status-prev")?.addEventListener("click", () => { state.status.page = Math.max(1, state.status.page - 1); loadStatus(); });
    qs("status-next")?.addEventListener("click", () => { state.status.page = Math.min(state.status.totalPages, state.status.page + 1); loadStatus(); });
    loadStatus().catch(() => {});
  }
  if (page === "heatmap") {
    const fromInput = qs("trend-date-from");
    const toInput = qs("trend-date-to");
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    if (toInput && !toInput.value) toInput.value = todayStr;
    if (fromInput && !fromInput.value) {
      const from = new Date(today.getTime() - 29 * 24 * 60 * 60 * 1000);
      fromInput.value = from.toISOString().slice(0, 10);
    }
    qs("trend-apply")?.addEventListener("click", () => { loadHeatmap(); });
    qs("trend-mode")?.addEventListener("change", () => loadHeatmap());
    loadHeatmap().catch(() => {});
  }
  startAutoRefresh();
}

document.addEventListener("DOMContentLoaded", () => {
  bind().catch(() => {});
});

</script>
