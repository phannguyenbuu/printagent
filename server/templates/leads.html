{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-header-row">
    <h3>Leads Management</h3>
    <button id="lead-create-btn" class="filter-btn">Create Lead</button>
  </div>

  <div class="filter-board">
    <div class="filter-group">
      <label>Name</label>
      <input type="text" id="filter-name" placeholder="Search by name...">
    </div>
    <div class="filter-group">
      <label>Date From</label>
      <input type="date" id="filter-date-from">
    </div>
    <div class="filter-group">
      <label>Date To</label>
      <input type="date" id="filter-date-to">
    </div>
    <button id="apply-filters" class="filter-btn">Apply</button>
  </div>

  <div class="table-wrap">
    <table class="generic-table">
      <thead>
        <tr>
          <th>ID (Lead)</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Notes</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="leads-tbody">
        <tr><td colspan="7" class="loading">Loading leads...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loadLeadsLocal = () => {
        const params = new URLSearchParams({
            name: qs('filter-name').value,
            date_from: qs('filter-date-from').value,
            date_to: qs('filter-date-to').value
        });
        
        fetch(`/api/leads/list?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('leads-tbody');
                if (data.ok && data.rows) {
                    tbody.innerHTML = data.rows.map(r => `
                        <tr>
                            <td><code>${escapeHtml(r.id)}</code></td>
                            <td>${escapeHtml(r.name)}</td>
                            <td>${escapeHtml(r.email || '')}</td>
                            <td>${escapeHtml(r.phone || '')}</td>
                            <td>${escapeHtml(r.notes || '')}</td>
                            <td>${r.created_at || ''}</td>
                            <td class="action-cell">
                                <button class="icon-btn edit" data-id="${r.id}" title="Edit">${iconPencilSvg()}</button>
                                <button class="icon-btn delete" data-id="${r.id}" title="Delete">${iconTrashSvg()}</button>
                            </td>
                        </tr>
                    `).join('') || '<tr><td colspan="7">No leads found</td></tr>';

                    tbody.querySelectorAll('.edit').forEach(btn => {
                        btn.onclick = () => {
                            const row = data.rows.find(x => x.id === btn.dataset.id);
                            handleUpsertLead(row);
                        };
                    });
                    tbody.querySelectorAll('.delete').forEach(btn => {
                        btn.onclick = () => {
                            if (confirm('Delete this lead?')) {
                                fetch(`/api/leads/${btn.dataset.id}`, { method: 'DELETE' })
                                    .then(res => res.json()).then(() => loadLeadsLocal());
                            }
                        };
                    });
                }
            });
    };

    loadLeadsLocal();
    qs('apply-filters').onclick = loadLeadsLocal;
    document.getElementById('refresh-btn').onclick = loadLeadsLocal;
    document.getElementById('lead-create-btn').onclick = () => handleUpsertLead();
});
</script>
{% endblock %}
