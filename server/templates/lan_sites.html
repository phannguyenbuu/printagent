{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-header-row">
    <h3>LAN Networks</h3>
    <button id="refresh-btn" class="filter-btn">Refresh</button>
  </div>

  <div class="filter-board">
    <div class="filter-group">
      <label>Lead</label>
      <select id="filter-lead">
        <option value="">All Leads</option>
      </select>
    </div>
    <div class="filter-group">
      <label>LAN UID</label>
      <input type="text" id="filter-lan" placeholder="Search UID...">
    </div>
    <div class="filter-group">
      <label>LAN Name</label>
      <input type="text" id="filter-name" placeholder="Search name...">
    </div>
    <div class="filter-group">
      <label>Date From</label>
      <input type="date" id="filter-date-from">
    </div>
    <div class="filter-group">
      <label>Date To</label>
      <input type="date" id="filter-date-to">
    </div>
    <button id="apply-filters" class="filter-btn">Apply</button>
  </div>

  <div class="table-wrap">
    <table class="generic-table">
      <thead>
        <tr>
          <th>Lead</th>
          <th>LAN UID</th>
          <th>LAN Name</th>
          <th>Subnet</th>
          <th>Gateway IP</th>
          <th>Gateway MAC</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="lan-sites-table-body">
        <tr>
          <td colspan="8" style="text-align: center;">Loading LAN sites...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loadLeads = () => {
        fetch('/api/leads').then(res => res.json()).then(data => {
            const sel = qs('filter-lead');
            if (data.leads) {
                data.leads.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l;
                    opt.textContent = l;
                    sel.appendChild(opt);
                });
            }
        });
    };

    const fetchLanSites = async () => {
        try {
            const params = new URLSearchParams({
                lead: qs('filter-lead').value,
                lan_uid: qs('filter-lan').value,
                name: qs('filter-name').value,
                date_from: qs('filter-date-from').value,
                date_to: qs('filter-date-to').value
            });
            const resp = await fetch(`/api/lan-sites?${params.toString()}`);
            const data = await resp.json();
            const body = document.getElementById('lan-sites-table-body');
            body.innerHTML = '';
            
            if (data.rows && data.rows.length > 0) {
                data.rows.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${escapeHtml(row.lead)}</td>
                        <td style="font-family: monospace; font-weight: bold;">${escapeHtml(row.lan_uid)}</td>
                        <td>${escapeHtml(row.lan_name || '-')}</td>
                        <td>${escapeHtml(row.subnet_cidr || '-')}</td>
                        <td>${escapeHtml(row.gateway_ip || '-')}</td>
                        <td style="font-family: monospace;">${escapeHtml(row.gateway_mac || '-')}</td>
                        <td>${row.created_at}</td>
                        <td class="action-cell">
                            <button class="icon-btn delete" data-uid="${row.lan_uid}" data-lead="${row.lead}" title="Delete">${iconTrashSvg()}</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
                
                // Bind delete buttons
                body.querySelectorAll('.delete').forEach(btn => {
                    btn.onclick = async () => {
                        if (!confirm('Are you sure you want to delete this LAN Site?')) return;
                        const uid = btn.dataset.uid;
                        const lead = btn.dataset.lead;
                        const res = await fetch(`/api/lan-sites/${uid}?lead=${lead}`, { method: 'DELETE' });
                        if (res.ok) fetchLanSites();
                    };
                });
            } else {
                body.innerHTML = '<tr><td colspan="8" style="text-align: center;">No LAN sites found</td></tr>';
            }
        } catch (err) {
            console.error('Failed to fetch LAN sites:', err);
        }
    };

    loadLeads();
    fetchLanSites();
    qs('apply-filters').onclick = fetchLanSites;
    qs('refresh-btn').onclick = fetchLanSites;
});
</script>
{% endblock %}
